<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; width: 380px; padding: 16px; background: #f9f9f9; }

    h2 { font-size: 15px; color: #7a003c; margin-bottom: 12px; }

    .search-row { display: flex; gap: 6px; margin-bottom: 12px; }
    input {
      flex: 1; padding: 7px 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 13px;
    }
    button {
      padding: 7px 12px; border: none; border-radius: 6px;
      background: #7a003c; color: white; cursor: pointer; font-size: 13px;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    #result { font-size: 13px; }
    .card { background: white; border-radius: 8px; padding: 12px; border: 1px solid #e0e0e0; }
    .card .course-name { font-weight: bold; margin-bottom: 8px; color: #222; }
    .stat { display: flex; justify-content: space-between; margin-top: 5px; color: #444; }
    .stat span:last-child { font-weight: bold; color: #7a003c; }

    .summary { font-size: 12.5px; color: #555; line-height: 1.5; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee; }

    .course-info { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .info-row { margin-top: 5px; color: #444; }
    .info-label { display: block; font-size: 11px; font-weight: bold; color: #7a003c; text-transform: uppercase; }
    .info-value { display: block; font-size: 12px; color: #444; margin-top: 2px; line-height: 1.4; }

    .term-card { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eee; }
    .term-label { font-size: 11px; font-weight: bold; color: #7a003c; text-transform: uppercase; margin-bottom: 3px; }
    .error { color: #c0392b; }

    .loading {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #888; padding: 18px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid #e0e0e0;
      border-top-color: #7a003c;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
  <h2>McMaster Course Lookup</h2>

  <div class="search-row">
    <input id="course-input" type="text" placeholder="e.g. CHEM 1A03" />
    <button id="search-btn">Search</button>
  </div>
  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
